<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>InsurClaw — EU consumer insurance advocate</title>
  <style>
    :root { --bg: #0f1419; --fg: #e7e9ea; --accent: #1d9bf0; --muted: #71767b; }
    * { box-sizing: border-box; }
    body {
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: var(--bg);
      color: var(--fg);
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      line-height: 1.5;
    }
    main { max-width: 36rem; text-align: center; }
    h1 { font-size: 1.75rem; font-weight: 700; margin: 0 0 0.5rem; }
    .tag { color: var(--muted); font-size: 0.95rem; margin-bottom: 1.5rem; }
    p { color: var(--muted); font-size: 0.95rem; margin: 0 0 1rem; }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }
    footer { margin-top: 2rem; font-size: 0.8rem; color: var(--muted); }
  </style>
</head>
<body>
  <main>
    <h1>InsurClaw 🦞</h1>
    <p class="tag">Autonomous consumer insurance advocate · EU</p>
    <p>
      Static preview deployed via <a href="https://here.now" rel="noopener">here.now</a>.
      Not legal or insurance advice — informational only.
    </p>
    <footer>InsurClaw · Mar 2026</footer>
  </main>
</body>
</html>
